name: Package Desktop Apps

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    name: Test and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build server
        run: npm run build:server

      - name: Build web
        run: npm run build:web

  package-macos:
    name: Package macOS
    runs-on: macos-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Package macOS app
        run: npm run package:mac

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: flydrop-macos
          path: |
            release/*.dmg
            release/*.dmg.blockmap
          if-no-files-found: error

  package-windows:
    name: Package Windows
    runs-on: windows-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Package Windows app
        shell: cmd
        run: scripts\package-win.cmd

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: flydrop-windows
          path: |
            release/*.exe
            release/*.exe.blockmap
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - package-macos
      - package-windows
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          # 只收集文件（download-artifact 会建子目录，通配符会误匹配目录导致上传失败）
          mapfile -t assets < <(find artifacts -type f)
          if [ ${#assets[@]} -eq 0 ]; then
            echo "No artifact files found under artifacts/" >&2
            exit 1
          fi
          printf 'Uploading: %s\n' "${assets[@]}"
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "${assets[@]}" --clobber
          else
            gh release create "$TAG_NAME" "${assets[@]}" --title "$TAG_NAME" --generate-notes
          fi
